<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Park BBQ Kitchen - QR Code Generator</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        .container {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            text-align: center;
            max-width: 500px;
            width: 100%;
        }
        h1 {
            color: #333;
            margin-bottom: 30px;
            font-size: 24px;
        }
        .input-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: bold;
        }
        input {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
            box-sizing: border-box;
        }
        input:focus {
            outline: none;
            border-color: #667eea;
        }
        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 16px;
            border-radius: 8px;
            cursor: pointer;
            width: 100%;
            margin-top: 10px;
            font-weight: bold;
            transition: transform 0.2s;
        }
        button:hover {
            transform: translateY(-2px);
        }
        #qrcode {
            margin-top: 30px;
            display: flex;
            justify-content: center;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 10px;
        }
        #qrcode img {
            max-width: 100%;
            height: auto;
        }
        .download-btn {
            background: #28a745;
            margin-top: 20px;
        }
        .download-btn:hover {
            background: #218838;
        }
        .info {
            margin-top: 20px;
            padding: 15px;
            background: #e7f3ff;
            border-radius: 8px;
            color: #0066cc;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🍖 Park BBQ Kitchen QR Code Generator</h1>
        
        <div class="input-group">
            <label for="appUrl">App URL:</label>
            <input 
                type="url" 
                id="appUrl" 
                placeholder="https://your-app-url.com" 
                value="https://park-bbq-kitchen.vercel.app"
            >
        </div>
        
        <button onclick="generateQRCode()">Generate QR Code</button>
        
        <div id="qrcode"></div>
        
        <button id="downloadBtn" class="download-btn" onclick="downloadQRCode()" style="display: none;">
            Download QR Code
        </button>
        
        <div class="info">
            <strong>Instructions:</strong><br>
            1. Enter your app URL above<br>
            2. Click "Generate QR Code"<br>
            3. Click "Download QR Code" to save<br>
            4. Print and display for easy access
        </div>
    </div>

    <script>
        let qrCode = null;

        function generateQRCode() {
            const url = document.getElementById('appUrl').value;
            
            if (!url) {
                alert('Please enter an app URL');
                return;
            }

            const qrcodeContainer = document.getElementById('qrcode');
            qrcodeContainer.innerHTML = '';

            qrCode = new QRCode(qrcodeContainer, {
                text: url,
                width: 256,
                height: 256,
                colorDark: "#000000",
                colorLight: "#ffffff",
                correctLevel: QRCode.CorrectLevel.H
            });

            document.getElementById('downloadBtn').style.display = 'block';
        }

        function downloadQRCode() {
            const qrcodeContainer = document.getElementById('qrcode');
            const img = qrcodeContainer.querySelector('img');
            
            if (img) {
                const link = document.createElement('a');
                link.href = img.src;
                link.download = 'park-bbq-kitchen-qr.png';
                link.click();
            }
        }

        // Generate QR code on page load with default URL
        window.onload = function() {
            generateQRCode();
        };
    </script>
</body>
</html>
