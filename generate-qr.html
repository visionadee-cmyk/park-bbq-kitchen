<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Park BBQ Kitchen - QR Code Generator</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        .container {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            text-align: center;
            max-width: 500px;
            width: 100%;
        }
        h1 {
            color: #333;
            margin-bottom: 30px;
            font-size: 24px;
        }
        .input-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: bold;
        }
        input {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
            box-sizing: border-box;
        }
        input:focus {
            outline: none;
            border-color: #667eea;
        }
        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 16px;
            border-radius: 8px;
            cursor: pointer;
            width: 100%;
            margin-top: 10px;
            font-weight: bold;
            transition: transform 0.2s;
        }
        button:hover {
            transform: translateY(-2px);
        }
        #qrcode {
            margin-top: 30px;
            display: flex;
            justify-content: center;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 10px;
        }
        #qrcode img {
            max-width: 100%;
            height: auto;
        }
        #qrCanvas {
            display: none;
        }
        #brandedQR {
            margin-top: 30px;
            display: none;
        }
        .download-btn {
            background: #28a745;
            margin-top: 20px;
        }
        .download-btn:hover {
            background: #218838;
        }
        .info {
            margin-top: 20px;
            padding: 15px;
            background: #e7f3ff;
            border-radius: 8px;
            color: #0066cc;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🍖 Park BBQ Kitchen QR Code Generator</h1>
        
        <div class="input-group">
            <label for="appUrl">App URL:</label>
            <input 
                type="url" 
                id="appUrl" 
                placeholder="https://your-app-url.com" 
                value="https://park-bbq-kitchen.vercel.app"
            >
        </div>
        
        <button onclick="generateQRCode()">Generate QR Code</button>
        
        <div id="qrcode"></div>
        <img id="brandedQR" alt="Branded QR Code" />
        <canvas id="qrCanvas"></canvas>
        
        <button id="downloadBtn" class="download-btn" onclick="downloadQRCode()" style="display: none;">
            Download QR Code
        </button>
        
        <div class="info">
            <strong>Instructions:</strong><br>
            1. Enter your app URL above<br>
            2. Click "Generate QR Code"<br>
            3. Click "Download QR Code" to save<br>
            4. Print and display for easy access
        </div>
    </div>

    <script>
        let qrCode = null;

        function generateQRCode() {
            const url = document.getElementById('appUrl').value;
            
            if (!url) {
                alert('Please enter an app URL');
                return;
            }

            const qrcodeContainer = document.getElementById('qrcode');
            qrcodeContainer.innerHTML = '';

            qrCode = new QRCode(qrcodeContainer, {
                text: url,
                width: 256,
                height: 256,
                colorDark: "#000000",
                colorLight: "#ffffff",
                correctLevel: QRCode.CorrectLevel.H
            });

            // Wait for QR code to generate, then add branding
            setTimeout(() => {
                addBranding();
            }, 100);
        }

        function addBranding() {
            const qrImg = document.querySelector('#qrcode img');
            if (!qrImg) return;

            const canvas = document.getElementById('qrCanvas');
            const ctx = canvas.getContext('2d');
            
            // Set canvas size (QR code + padding + header)
            const qrSize = 256;
            const padding = 20;
            const headerHeight = 60;
            canvas.width = qrSize + padding * 2;
            canvas.height = qrSize + padding * 2 + headerHeight;

            // Fill background
            ctx.fillStyle = '#ffffff';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Add border/frame
            ctx.strokeStyle = '#667eea';
            ctx.lineWidth = 4;
            ctx.strokeRect(2, 2, canvas.width - 4, canvas.height - 4);

            // Add header background
            ctx.fillStyle = '#667eea';
            ctx.fillRect(padding, padding, qrSize, headerHeight);

            // Add app name text
            ctx.fillStyle = '#ffffff';
            ctx.font = 'bold 18px Arial';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText('Park BBQ Kitchen', canvas.width / 2, padding + headerHeight / 2);

            // Add subtitle
            ctx.font = '12px Arial';
            ctx.fillStyle = '#ffffff';
            ctx.fillText('Booking System', canvas.width / 2, padding + headerHeight / 2 + 20);

            // Draw QR code
            const qrY = padding + headerHeight + padding;
            ctx.drawImage(qrImg, padding, qrY, qrSize, qrSize);

            // Convert canvas to image
            const brandedQR = document.getElementById('brandedQR');
            brandedQR.src = canvas.toDataURL('image/png');
            brandedQR.style.display = 'block';
            brandedQR.style.maxWidth = '100%';
            brandedQR.style.height = 'auto';
            brandedQR.style.borderRadius = '10px';

            // Hide original QR code
            document.getElementById('qrcode').style.display = 'none';

            // Show download button
            document.getElementById('downloadBtn').style.display = 'block';
        }

        function downloadQRCode() {
            const canvas = document.getElementById('qrCanvas');
            const link = document.createElement('a');
            link.href = canvas.toDataURL('image/png');
            link.download = 'park-bbq-kitchen-qr-code.png';
            link.click();
        }

        // Generate QR code on page load with default URL
        window.onload = function() {
            generateQRCode();
        };
    </script>
</body>
</html>
